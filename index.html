<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sourcing Thumbs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Inter', sans-serif;
    }
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-weight: bold;
      font-size: 1.25rem;
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Header -->
  <div class="w-full max-w-3xl flex items-center justify-center mb-6">
    <img src="https://cdn-icons-png.flaticon.com/512/891/891462.png" 
         alt="Scanner icon" class="h-12 w-12 rounded-full shadow-lg bg-slate-800 p-2">
    <h1 class="ml-2 text-3xl font-bold text-indigo-400">Sourcing Thumbs</h1>
  </div>

  <!-- App container -->
  <div class="w-full max-w-3xl glass rounded-3xl shadow-2xl p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- LEFT: Photo preview -->
    <div class="space-y-4">
      <h2 class="text-xl font-bold text-indigo-300">Item Preview</h2>

      <div id="previewContainer"
           class="hidden bg-slate-900/40 rounded-2xl p-3 border border-slate-700 shadow-md">
        <img id="previewImage" class="rounded-xl w-full" alt="Preview">
      </div>

      <button onclick="document.getElementById('cameraInput').click()"
              class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 transition-all p-4 rounded-2xl font-bold text-lg shadow-md">
        📷 Capture / Upload Item
      </button>

      <input type="file" id="cameraInput" accept="image/*" capture="environment"
             class="hidden" onchange="handlePhotoUpload(event)">

      <input type="text" id="descriptionInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Brand, item, size (e.g. Levi's 501 jacket medium)">
    </div>

    <!-- RIGHT: Controls -->
    <div class="space-y-4">
      <h2 class="text-xl font-bold text-indigo-300">Resale Analysis</h2>

      <input type="number" id="cogInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Cost of goods ($)">

      <input type="number" id="profitInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Desired profit ($)">

      <button onclick="analyzeItem()"
              class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 transition-all p-4 rounded-2xl font-bold text-lg shadow-md">
        ✅ Analyze for Resale
      </button>

      <div id="result" class="text-center mt-4"></div>
      <div id="details" class="text-center text-sm text-slate-300"></div>
    </div>

  </div>

<script>
  let base64Image = null;

  function handlePhotoUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxWidth = 800;
        const scale = maxWidth / img.width;
        canvas.width = maxWidth;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        previewContainer.classList.remove('hidden');
        previewImage.src = e.target.result;

        identifyItem();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function identifyItem() {
    console.log('identifyItem() called, base64Image length:', base64Image ? base64Image.length : 'null');
    const descriptionInput = document.getElementById('descriptionInput');
    const originalPlaceholder = descriptionInput.placeholder;
    descriptionInput.placeholder = '🔍 Identifying item from photo...';
    descriptionInput.disabled = true;

    try {
      const response = await fetch('/api/identify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        cache: 'no-store',
        body: JSON.stringify({ image: base64Image })
      });
      console.log('identify response status:', response.status);
      const data = await response.json();
      console.log('identify response data:', data);

      if (response.ok && data.description) {
        descriptionInput.value = data.description;
        descriptionInput.classList.add('ring-2', 'ring-amber-400');
        setTimeout(() => {
          descriptionInput.classList.remove('ring-2', 'ring-amber-400');
        }, 2500);
      } else {
        console.error('identify failed:', data);
        descriptionInput.placeholder = 'Could not auto-identify - type brand/item/size manually';
      }
    } catch (err) {
      console.error('identify threw an error:', err);
      descriptionInput.placeholder = 'Could not auto-identify - type brand/item/size manually';
    } finally {
      descriptionInput.disabled = false;
      if (!descriptionInput.value) {
        descriptionInput.placeholder = originalPlaceholder;
      }
    }
  }

  async function analyzeItem() {
    const cog = parseFloat(document.getElementById('cogInput').value || '0');
    const desiredProfit = parseFloat(document.getElementById('profitInput').value || '0');
    const description = document.getElementById('descriptionInput').value.trim();
    const resultEl = document.getElementById('result');
    const detailsEl = document.getElementById('details');

    if (!description) {
      resultEl.innerHTML = '<span class="badge bg-slate-700">✏️ Enter a brand/item description first</span>';
      detailsEl.textContent = '';
      return;
    }

    resultEl.innerHTML = '<span class="badge bg-slate-700">⏳ Checking sold prices...</span>';
    detailsEl.textContent = '';

    try {
      const response = await fetch('/api/search?q=' + encodeURIComponent(description), { cache: 'no-store' });
      const data = await response.json();

      if (!response.ok) {
        resultEl.innerHTML = '<span class="badge bg-rose-500 text-white">⚠️ Error checking eBay</span>';
        detailsEl.textContent = data.error || 'Unknown error';
        return;
      }

      if (!data.count || data.count === 0) {
        resultEl.innerHTML = '<span class="badge bg-slate-700">🤷 No sold comps found</span>';
        detailsEl.textContent = 'Try a broader or different search term.';
        return;
      }

      const avgSold = data.average;
      const expectedProfit = avgSold - cog;
      const verdict = expectedProfit >= desiredProfit ? 'thumbs_up' : 'thumbs_down';

      if (verdict === 'thumbs_up') {
        resultEl.innerHTML = '<span class="badge bg-emerald-500 text-white">👍 BUY</span>';
      } else {
        resultEl.innerHTML = '<span class="badge bg-rose-500 text-white">👎 PASS</span>';
      }

      detailsEl.textContent =
        `Avg sold: $${avgSold} (${data.count} comps${data.usedFilterApplied === false ? ', any condition' : ', used/pre-owned'}, range $${data.low}-$${data.high}) · Expected profit: $${expectedProfit.toFixed(2)}`;
    } catch (err) {
      resultEl.innerHTML = '<span class="badge bg-rose-500 text-white">⚠️ Error</span>';
      detailsEl.textContent = err.message;
    }
  }
</script>
</body>
</html>
