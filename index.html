<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sourcing Thumbs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Inter', sans-serif;
    }
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-weight: bold;
      font-size: 1.25rem;
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Header -->
  <div class="w-full max-w-3xl flex items-center justify-center mb-6">
    <img src="https://cdn-icons-png.flaticon.com/512/891/891462.png" 
         alt="Scanner icon" class="h-12 w-12 rounded-full shadow-lg bg-slate-800 p-2">
    <h1 class="ml-2 text-3xl font-bold text-indigo-400">Sourcing Thumbs</h1>
  </div>

  <!-- App container -->
  <div class="w-full max-w-3xl glass rounded-3xl shadow-2xl p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- LEFT: Photo preview -->
    <div class="space-y-4">
      <h2 class="text-xl font-bold text-indigo-300">Item Preview</h2>

      <div id="previewContainer"
           class="hidden bg-slate-900/40 rounded-2xl p-3 border border-slate-700 shadow-md">
        <img id="previewImage" class="rounded-xl w-full" alt="Preview">
      </div>

      <button onclick="document.getElementById('cameraInput').click()"
              class="w-full bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 transition-all p-4 rounded-2xl font-bold text-lg shadow-md">
        📷 Capture / Upload Item
      </button>

      <input type="file" id="cameraInput" accept="image/*" capture="environment"
             class="hidden" onchange="handlePhotoUpload(event)">

      <button id="secondPhotoBtn" onclick="document.getElementById('cameraInput2').click()"
              class="hidden w-full bg-slate-700 hover:bg-slate-600 transition-all p-2 rounded-xl text-sm text-slate-300">
        📷 Add close-up (e.g. tag) &amp; re-identify
      </button>

      <div id="secondPhotoConfirm" class="hidden flex items-center gap-2 bg-slate-900/40 rounded-xl p-2 border border-emerald-600/50">
        <img id="secondPhotoThumb" class="w-10 h-10 object-cover rounded-lg" alt="Close-up thumbnail">
        <span class="text-xs text-emerald-400">✅ Close-up added — re-identifying...</span>
      </div>

      <input type="file" id="cameraInput2" accept="image/*" capture="environment"
             class="hidden" onchange="handleSecondPhotoUpload(event)">

      <input type="text" id="descriptionInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Brand, item, size (e.g. Levi's 501 jacket medium)">
    </div>

    <!-- RIGHT: Controls -->
    <div class="space-y-4">
      <h2 class="text-xl font-bold text-indigo-300">Resale Analysis</h2>

      <input type="number" id="cogInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Cost of goods ($)">

      <input type="number" id="profitInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Desired profit ($)">

      <button onclick="analyzeItem()"
              class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 transition-all p-4 rounded-2xl font-bold text-lg shadow-md">
        ✅ Analyze for Resale
      </button>

      <button onclick="tryBrightData()"
              class="w-full bg-slate-700 hover:bg-slate-600 transition-all p-2 rounded-xl text-sm text-slate-300">
        🧪 Experimental: Try Bright Data (slow, ~1-3 min)
      </button>

      <div id="brightDataStatus" class="text-center text-xs text-slate-400"></div>

      <div id="result" class="text-center mt-4"></div>
      <div id="details" class="text-center text-sm text-slate-300"></div>
    </div>

  </div>

<script>
  let base64Image = null;
  let base64Image2 = null;

  function handleSecondPhotoUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxWidth = 800;
        const scale = maxWidth / img.width;
        canvas.width = maxWidth;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        base64Image2 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        const confirmEl = document.getElementById('secondPhotoConfirm');
        const thumbEl = document.getElementById('secondPhotoThumb');
        thumbEl.src = e.target.result;
        confirmEl.classList.remove('hidden');
        confirmEl.querySelector('span').textContent = '✅ Close-up added — re-identifying...';

        identifyItem();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function tryBrightData() {
    const description = document.getElementById('descriptionInput').value.trim();
    const statusEl = document.getElementById('brightDataStatus');

    if (!description) {
      statusEl.textContent = 'Enter a description first';
      return;
    }

    statusEl.textContent = '🧪 Submitting to Bright Data...';

    try {
      const triggerResponse = await fetch('/api/search-brightdata?q=' + encodeURIComponent(description), { cache: 'no-store' });
      const triggerData = await triggerResponse.json();

      const snapshotId = triggerData?.brightDataResponse?.snapshot_id;
      if (!snapshotId) {
        statusEl.textContent = '❌ No snapshot ID returned: ' + JSON.stringify(triggerData.brightDataResponse);
        return;
      }

      statusEl.textContent = '⏳ Queued (snapshot ' + snapshotId + '). Checking every 10s...';

      const maxChecks = 18;
      for (let i = 0; i < maxChecks; i++) {
        await new Promise((r) => setTimeout(r, 10000));
        statusEl.textContent = `⏳ Checking... (attempt ${i + 1}/${maxChecks}, ${(i + 1) * 10}s elapsed)`;

        const statusResponse = await fetch('/api/search-brightdata-status?id=' + snapshotId, { cache: 'no-store' });
        const statusData = await statusResponse.json();

        if (statusData.progressData?.status === 'ready' || statusData.progressData?.status === 'done') {
          statusEl.textContent = `✅ Ready after ${(i + 1) * 10}s! Records: ` +
            (Array.isArray(statusData.snapshotData) ? statusData.snapshotData.length : 'see console');
          console.log('Bright Data full result:', statusData.snapshotData);
          return;
        }

        if (statusData.progressData?.status === 'failed') {
          statusEl.textContent = '❌ Bright Data job failed.';
          return;
        }
      }

      statusEl.textContent = '⏱️ Timed out after 3 minutes still waiting.';
    } catch (err) {
      statusEl.textContent = '❌ Error: ' + err.message;
    }
  }

  function handlePhotoUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    base64Image2 = null;
    document.getElementById('secondPhotoConfirm').classList.add('hidden');

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxWidth = 800;
        const scale = maxWidth / img.width;
        canvas.width = maxWidth;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        previewContainer.classList.remove('hidden');
        previewImage.src = e.target.result;

        document.getElementById('secondPhotoBtn').classList.remove('hidden');

        identifyItem();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function identifyItem() {
    console.log('identifyItem() called, base64Image length:', base64Image ? base64Image.length : 'null');
    const descriptionInput = document.getElementById('descriptionInput');
    const originalPlaceholder = descriptionInput.placeholder;
    descriptionInput.placeholder = '🔍 Identifying item from photo...';
    descriptionInput.disabled = true;

    try {
      const response = await fetch('/api/identify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        cache: 'no-store',
        body: JSON.stringify({ image: base64Image, image2: base64Image2 })
      });
      console.log('identify response status:', response.status);
      const data = await response.json();
      console.log('identify response data:', data);

      if (response.ok && data.description) {
        descriptionInput.value = data.description;
        descriptionInput.classList.add('ring-2', 'ring-amber-400');
        setTimeout(() => {
          descriptionInput.classList.remove('ring-2', 'ring-amber-400');
        }, 2500);
        if (base64Image2) {
          document.getElementById('secondPhotoConfirm').querySelector('span').textContent = '✅ Close-up used for this result';
        }
      } else {
        console.error('identify failed:', data);
        descriptionInput.placeholder = 'Could not auto-identify - type brand/item/size manually';
      }
    } catch (err) {
      console.error('identify threw an error:', err);
      descriptionInput.placeholder = 'Could not auto-identify - type brand/item/size manually';
    } finally {
      descriptionInput.disabled = false;
      if (!descriptionInput.value) {
        descriptionInput.placeholder = originalPlaceholder;
      }
    }
  }

  async function analyzeItem() {
    const cog = parseFloat(document.getElementById('cogInput').value || '0');
    const desiredProfit = parseFloat(document.getElementById('profitInput').value || '0');
    const description = document.getElementById('descriptionInput').value.trim();
    const resultEl = document.getElementById('result');
    const detailsEl = document.getElementById('details');

    if (!description) {
      resultEl.innerHTML = '<span class="badge bg-slate-700">✏️ Enter a brand/item description first</span>';
      detailsEl.textContent = '';
      return;
    }

    resultEl.innerHTML = '<span class="badge bg-slate-700">⏳ Checking sold prices...</span>';
    detailsEl.textContent = '';

    try {
      const response = await fetch('/api/search?q=' + encodeURIComponent(description), { cache: 'no-store' });
      const data = await response.json();

      if (!response.ok) {
        resultEl.innerHTML = '<span class="badge bg-rose-500 text-white">⚠️ Error checking eBay</span>';
        detailsEl.textContent = data.error || 'Unknown error';
        return;
      }

      if (!data.count || data.count === 0) {
        resultEl.innerHTML = '<span class="badge bg-slate-700">🤷 No sold comps found</span>';
        detailsEl.textContent = 'Try a broader or different search term.';
        return;
      }

      const avgSold = data.average;
      const expectedProfit = avgSold - cog;
      const verdict = expectedProfit >= desiredProfit ? 'thumbs_up' : 'thumbs_down';

      if (verdict === 'thumbs_up') {
        resultEl.innerHTML = '<span class="badge bg-emerald-500 text-white">👍 BUY</span>';
      } else {
        resultEl.innerHTML = '<span class="badge bg-rose-500
