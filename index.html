<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sourcing Thumbs</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center min-h-screen p-6">

  <!-- Header -->
  <div class="w-full max-w-3xl flex items-center justify-center mb-6">
    <img src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif" 
         alt="Scanner animation" class="h-16 w-16 rounded-full shadow-lg">
    <h1 class="ml-3 text-3xl font-bold text-indigo-400">Sourcing Thumbs</h1>
  </div>

  <!-- Upload + Inputs -->
  <div class="bg-gray-800 rounded-xl shadow-lg p-6 w-full max-w-3xl">
    <label class="block mb-4">
      <span class="text-indigo-300 font-semibold">Upload Item Photo</span>
      <input type="file" id="photoUpload" accept="image/*" 
             class="mt-2 block w-full text-sm text-gray-300 
                    file:mr-4 file:py-2 file:px-4 
                    file:rounded-full file:border-0 
                    file:text-sm file:font-semibold 
                    file:bg-indigo-500 file:text-white 
                    hover:file:bg-indigo-600">
    </label>

    <div id="photoPreview" class="mb-4 flex justify-center"></div>

    <label class="block mb-4">
      <span class="text-indigo-300 font-semibold">Cost of Goods ($)</span>
      <input type="number" id="cogInput" placeholder="e.g. 12.50" 
             class="mt-2 w-full p-2 rounded bg-gray-700 text-gray-100">
    </label>

    <label class="block mb-4">
      <span class="text-indigo-300 font-semibold">Desired Profit Margin (%)</span>
      <input type="number" id="marginInput" placeholder="e.g. 40" 
             class="mt-2 w-full p-2 rounded bg-gray-700 text-gray-100">
    </label>

    <button onclick="analyzeItem()" 
            class="w-full bg-indigo-500 hover:bg-indigo-600 
                   text-white font-bold py-2 px-4 rounded-lg">
      Analyze Item
    </button>
  </div>

  <!-- Results -->
  <div id="results" class="mt-6 w-full max-w-3xl bg-gray-800 rounded-xl shadow-lg p-6 hidden">
    <h2 class="text-xl font-bold text-indigo-400 mb-4">Verdict</h2>
    <div id="verdictText" class="text-lg"></div>
    <div id="profitCalc" class="mt-2 text-gray-300"></div>
  </div>

  <script>
    // Preview uploaded photo
    document.getElementById('photoUpload').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('photoPreview').innerHTML =
            `<img src="${e.target.result}" alt="Preview" class="h-48 rounded-lg shadow-md">`;
        };
        reader.readAsDataURL(file);
      }
    });

    // Fake analysis logic (replace with API later)
    function analyzeItem() {
      const cog = parseFloat(document.getElementById('cogInput').value) || 0;
      const margin = parseFloat(document.getElementById('marginInput').value) || 0;

      // Simulated resale average
      const resaleAvg = 45; // placeholder until API integration
      const targetProfit = cog * (margin / 100);
      const actualProfit = resaleAvg - cog;

      let verdict = actualProfit >= targetProfit ? "👍 BUY" : "👎 PASS";

      document.getElementById('results').classList.remove('hidden');
      document.getElementById('verdictText').textContent = verdict;
      document.getElementById('profitCalc').textContent =
        `Avg resale: $${resaleAvg} | COG: $${cog.toFixed(2)} | Profit: $${actualProfit.toFixed(2)} | Margin target: ${margin}%`;
    }
  </script>
</body>
</html>
