<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sourcing Thumbs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top left, #0f172a, #1e293b);
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

  <!-- App container -->
  <div class="w-full max-w-md bg-slate-800/60 backdrop-blur-md rounded-3xl shadow-xl p-6 space-y-5 border border-slate-700">

    <!-- Header -->
    <h1 class="text-center text-3xl font-bold tracking-tight text-indigo-400">Sourcing Thumbs</h1>

    <!-- Capture button -->
    <button onclick="document.getElementById('cameraInput').click()"
            class="w-full bg-indigo-500 hover:bg-indigo-600 transition-all p-4 rounded-2xl font-bold text-lg shadow-md">
      📷 Capture Item
    </button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment"
           class="hidden" onchange="handlePhotoUpload(event)">

    <!-- Inputs -->
    <div class="space-y-3">
      <input type="number" id="cogInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Cost of goods ($)">
      <input type="number" id="profitInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Desired profit ($)">
    </div>

    <!-- Analyze button -->
    <button onclick="analyzeWithCopilot()"
            class="w-full bg-emerald-500 hover:bg-emerald-600 transition-all p-4 rounded-2xl font-bold text-lg shadow-md">
      ✅ Analyze for Resale
    </button>

    <!-- Result -->
    <div id="result" class="text-center text-3xl font-bold mt-4"></div>
    <div id="details" class="text-center text-sm text-slate-300"></div>
  </div>

<script>
  let base64Image = null;

  function handlePhotoUpload(event) {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxWidth = 800;
        const scale = maxWidth / img.width;
        canvas.width = maxWidth;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function analyzeWithCopilot() {
    const cog = parseFloat(document.getElementById('cogInput').value || '0');
    const desiredProfit = parseFloat(document.getElementById('profitInput').value || '0');
    const resultEl = document.getElementById('result');
    const detailsEl = document.getElementById('details');

    if (!base64Image) {
      resultEl.textContent = '📷 Add a photo first';
      return;
    }

    resultEl.textContent = '⏳ Analyzing...';
    detailsEl.textContent = '';

    setTimeout(() => {
      const avgSold = 45; // simulated comp
      const expectedProfit = avgSold - cog;
      const verdict = expectedProfit >= desiredProfit ? 'thumbs_up' : 'thumbs_down';

      if (verdict === 'thumbs_up') {
        resultEl.textContent = '👍 BUY';
        resultEl.classList.add('text-emerald-400');
      } else {
        resultEl.textContent = '👎 PASS';
        resultEl.classList.add('text-rose-400');
      }

      detailsEl.textContent = `Avg sold: $${avgSold} · Expected profit: $${expectedProfit}`;
    }, 1500);
  }
</script>
</body>
</html>
