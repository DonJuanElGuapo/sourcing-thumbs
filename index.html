<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sourcing Thumbs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      font-family: 'Inter', sans-serif;
    }
    .glass {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.2);
    }
    .fade-in {
      animation: fadeIn 0.6s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

  <!-- App container -->
  <div class="w-full max-w-sm glass rounded-3xl shadow-2xl p-6 space-y-5 fade-in">

    <!-- Header -->
    <h1 class="text-center text-3xl font-bold tracking-tight text-indigo-400">Sourcing Thumbs</h1>

    <!-- Photo preview -->
    <div id="previewContainer" class="hidden">
      <img id="previewImage" class="rounded-2xl w-full shadow-md mb-3" alt="Preview">
    </div>

    <!-- Capture button -->
    <button onclick="document.getElementById('cameraInput').click()"
            class="w-full bg-indigo-500 hover:bg-indigo-600 transition-all p-4 rounded-2xl font-bold text-lg shadow-md">
      📷 Capture Item
    </button>
    <input type="file" id="cameraInput" accept="image/*" capture="environment"
           class="hidden" onchange="handlePhotoUpload(event)">

    <!-- Inputs -->
    <div class="space-y-3">
      <input type="number" id="cogInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Cost of goods ($)">
      <input type="number" id="profitInput"
             class="w-full bg-slate-900/70 p-4 rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-indigo-400 outline-none"
             placeholder="Desired profit ($)">
    </div>

    <!-- Analyze button -->
    <button onclick="analyzeWithCopilot()"
            class="w-full bg-emerald-500 hover:bg-emerald-600 transition-all p-4 rounded-2xl font-bold text-lg shadow-md">
      ✅ Analyze for Resale
    </button>

    <!-- Result -->
    <div id="result" class="text-center text-3xl font-bold mt-4"></div>
    <div id="details" class="text-center text-sm text-slate-300"></div>
  </div>
